name: Article Quality

on:
  pull_request:
    paths:
      - "**/*.md"
      - "scripts/check_article_quality.py"
      - ".github/workflows/article-quality.yml"

permissions:
  contents: read

jobs:
  article-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed articles
        run: python3 scripts/check_article_quality.py --base "${{ github.event.pull_request.base.sha }}" --head HEAD
